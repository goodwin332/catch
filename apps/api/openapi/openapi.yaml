          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Chat]
      summary: Send chat message
      operationId: sendChatMessage
      security:
        - cookieSession: []
        - csrfHeader: []
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendChatMessageRequest"
      responses:
        "201":
          description: Chat message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /chat/conversations/{conversationID}/messages/stream:
    get:
      tags: [Chat]
      summary: Stream chat messages
      operationId: streamChatMessages
      security:
        - cookieSession: []
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: after_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Server-sent events with ready, ping and message events
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /chat/conversations/{conversationID}/read:
    post:
      tags: [Chat]
      summary: Mark chat conversation as read
      operationId: markChatConversationRead
      security:
        - cookieSession: []
        - csrfHeader: []
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Conversation marked read
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /media/files:
    post:
      tags: [Media]
      summary: Upload media file
      operationId: uploadMediaFile
      security:
        - cookieSession: []
        - csrfHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Uploaded media file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaFile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: File too large
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /media/files/{fileID}:
    get:
      tags: [Media]
      summary: Get media file metadata
      operationId: getMediaFile
      parameters:
        - name: fileID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Media file metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaFile"
        "404":
          $ref: "#/components/responses/NotFound"

  /media/files/{fileID}/content:
    get:
      tags: [Media]
      summary: Download media file content
      operationId: getMediaFileContent
      parameters:
        - name: fileID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Media file content
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: catch_session
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token

  parameters:
    OAuthProvider:
      name: provider
      in: path
      required: true
      schema:
        type: string
        enum: [google, vk, yandex]
    ArticleId:
      name: articleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque cursor from previous list response.

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated user has no permission for this action
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource conflict
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationFailed:
      description: Validation failed
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Rate limit exceeded
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Service is temporarily unavailable
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    RequestEmailCodeRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
          maxLength: 254

    RequestEmailCodeResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted]
        dev_code:
          type: string
          description: Present only outside production when AUTH_DEV_EMAIL_CODE_IN_RESPONSE=true.

    VerifyEmailCodeRequest:
      type: object
      additionalProperties: false
      required: [email, code]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        code:
          type: string
          minLength: 6
          maxLength: 12

    DevLoginRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          default: dev@catch.local

    CurrentUserResponse:
      type: object
      additionalProperties: false
      required: [user, capabilities]
      properties:
        user:
          $ref: "#/components/schemas/User"
        capabilities:
          $ref: "#/components/schemas/Capabilities"

    User:
      type: object
      additionalProperties: false
      required: [id, email, rating, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
          maxLength: 40
        display_name:
          type: string
          maxLength: 120
        avatar_url:
          type: string
          format: uri
        rating:
          type: integer
          minimum: -1000000
          maximum: 1000000
        role:
          type: string
          enum: [user, admin]

    Capabilities:
      type: object
      additionalProperties: false
      required:
        - can_create_article
        - can_comment
        - can_chat
        - can_report
        - can_publish_directly
        - can_moderate
        - can_chat_with_dev_lead
      properties:
        can_create_article:
          type: boolean
        can_comment:
          type: boolean
        can_chat:
          type: boolean
        can_report:
          type: boolean
        can_publish_directly:
          type: boolean
        can_moderate:
          type: boolean
        can_chat_with_dev_lead:
          type: boolean

    PrivateProfile:
      type: object
      additionalProperties: false
      required: [user_id, email, rating, role]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
          maxLength: 40
        display_name:
          type: string
          maxLength: 120
        avatar_url:
          type: string
          format: uri
          maxLength: 2048
        rating:
          type: integer
        role:
          type: string
          enum: [user, admin]
        birth_date:
          type: string
          format: date
        bio:
          type: string
          maxLength: 1000
        boat:
          type: string
          maxLength: 120
        country_code:
          type: string
          maxLength: 8
        country_name:
          type: string
          maxLength: 120
        city_name:
          type: string
          maxLength: 120

    PublicProfile:
      type: object
      additionalProperties: false
      required: [user_id, rating]
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
          minLength: 3
          maxLength: 40
        display_name:
          type: string
          maxLength: 120
        avatar_url:
          type: string
          format: uri
          maxLength: 2048
        rating:
          type: integer
        bio:
          type: string
          maxLength: 1000
        boat:
          type: string
          maxLength: 120
        country_name:
          type: string
          maxLength: 120
        city_name:
          type: string
          maxLength: 120

    ProfileSearch:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PublicProfile"

    UpdateMyProfileRequest:
      type: object
      additionalProperties: false
      properties:
        username:
          type: string
          pattern: "^[a-z0-9_][a-z0-9_-]{2,39}$"
        display_name:
          type: string
          maxLength: 120
        avatar_url:
          type: string
          format: uri
          maxLength: 2048
        birth_date:
          type: string
          format: date
          description: Empty string clears the value.
        bio:
          type: string
          maxLength: 1000
        boat:
          type: string
          maxLength: 120
        country_code:
          type: string
          maxLength: 8
        country_name:
          type: string
          maxLength: 120
        city_name:
          type: string
          maxLength: 120

    ArticleDocument:
      type: object
      additionalProperties: true
      required: [type, version, blocks]
      properties:
        type:
          type: string
          const: catch.article
        version:
          type: integer
          minimum: 1
        blocks:
          type: array
          items:
            type: object
            additionalProperties: true

    CreateDraftRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 160
        content:
          $ref: "#/components/schemas/ArticleDocument"
        tags:
          type: array
          maxItems: 10
          items:
            type: string
            minLength: 1
            maxLength: 64

    UpdateDraftRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 160
        content:
          $ref: "#/components/schemas/ArticleDocument"
        tags:
          type: array
          maxItems: 10
          items:
            type: string
            minLength: 1
            maxLength: 64

    SubmitDraftRequest:
      type: object
      additionalProperties: false
      properties:
        publish_at:
          type: string
          format: date-time

    ArticleDraft:
      type: object
      additionalProperties: false
      required:
        - id
        - status
        - current_revision_id
        - moderation_required
        - title
        - content
        - excerpt
        - tags
        - version
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, in_moderation, ready_to_publish, published, archived, removed]
        current_revision_id:
          type: string
          format: uuid
        moderation_required:
          type: boolean
        title:
          type: string
        content:
          $ref: "#/components/schemas/ArticleDocument"
        excerpt:
          type: string
        tags:
          type: array
          items:
            type: string
        version:
          type: integer
          minimum: 1
        scheduled_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time

    ArticleDraftList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ArticleDraft"

    PublicArticle:
      type: object
      additionalProperties: false
      required: [id, author_id, title, content, excerpt, tags, reactions_up, reactions_down, reaction_score, published_at]
      properties:
        id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        title:
          type: string
        content:
          $ref: "#/components/schemas/ArticleDocument"
        excerpt:
          type: string
        tags:
          type: array
          items:
            type: string
        reactions_up:
          type: integer
          minimum: 0
        reactions_down:
          type: integer
          minimum: 0
        reaction_score:
          type: integer
        published_at:
          type: string
          format: date-time

    ArticleList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ArticleListItem"
        next_cursor:
          type: string

    ArticleListItem:
      type: object
      additionalProperties: false
      required: [id, author_id, title, excerpt, tags, reactions_up, reactions_down, reaction_score, published_at]
      properties:
        id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        title:
          type: string
        excerpt:
          type: string
        tags:
          type: array
          items:
            type: string
        reactions_up:
          type: integer
          minimum: 0
        reactions_down:
          type: integer
          minimum: 0
        reaction_score:
          type: integer
        published_at:
          type: string
          format: date-time

    CreateCommentRequest:
      type: object
      additionalProperties: false
      required: [body]
      properties:
        parent_id:
          type: string
          format: uuid
        body:
          type: string
          minLength: 1
          maxLength: 4000

    UpdateCommentRequest:
      type: object
      additionalProperties: false
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 4000

    Comment:
      type: object
      additionalProperties: false
      required: [id, article_id, author_id, body, status, reactions_up, reactions_down, reaction_score, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        article_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        body:
          type: string
        status:
          type: string
          enum: [active, deleted]
        reactions_up:
          type: integer
          minimum: 0
        reactions_down:
          type: integer
          minimum: 0
        reaction_score:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        edited_at:
          type: string
          format: date-time

    CommentList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Comment"

    SetReactionRequest:
      type: object
      additionalProperties: false
      required: [target_type, target_id, value]
      properties:
        target_type:
          type: string
          enum: [article, comment]
        target_id:
          type: string
          format: uuid
        value:
          type: integer
          enum: [-1, 0, 1]

    Reaction:
      type: object
      additionalProperties: false
      required: [target_type, target_id, value, reactions_up, reactions_down, reaction_score]
      properties:
        target_type:
          type: string
          enum: [article, comment]
        target_id:
          type: string
          format: uuid
        value:
          type: integer
          enum: [-1, 0, 1]
        reactions_up:
          type: integer
          minimum: 0
        reactions_down:
          type: integer
          minimum: 0
        reaction_score:
          type: integer

    BookmarkList:
      type: object
      additionalProperties: false
      required: [id, name, position]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        position:
          type: integer

