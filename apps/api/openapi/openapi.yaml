openapi: 3.1.0
info:
  title: Catch API
  version: 0.1.0
  description: Backend contracts for Catch modular monolith.
servers:
  - url: /api/v1
tags:
  - name: System
  - name: Auth
  - name: Profile
  - name: Articles
  - name: Comments
  - name: Reactions
  - name: Bookmarks
  - name: Reports
  - name: Moderation
  - name: Notifications
  - name: Chat
  - name: Media
  - name: Dev
paths:
  /auth/email/request-code:
    post:
      tags: [Auth]
      summary: Request email login or registration code
      description: Always returns the same public response and does not disclose whether an email exists.
      operationId: requestEmailCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestEmailCodeRequest"
      responses:
        "202":
          description: Email code request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestEmailCodeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/email/verify:
    post:
      tags: [Auth]
      summary: Verify email code and create session
      operationId: verifyEmailCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailCodeRequest"
      responses:
        "200":
          description: Authenticated user
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly session cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      operationId: getCurrentUser
      security:
        - cookieSession: []
      responses:
        "200":
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session
      operationId: logout
      security:
        - cookieSession: []
        - csrfHeader: []
      responses:
        "204":
          description: Session revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/oauth/{provider}/start:
    get:
      tags: [Auth]
      summary: Start OAuth authorization
      operationId: startOAuth
      parameters:
        - $ref: "#/components/parameters/OAuthProvider"
        - name: return_to
          in: query
          required: false
          schema:
            type: string
            maxLength: 512
      responses:
        "302":
          description: Redirect to OAuth provider
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/oauth/{provider}/callback:
    get:
      tags: [Auth]
      summary: Complete OAuth authorization
      operationId: completeOAuth
      parameters:
        - $ref: "#/components/parameters/OAuthProvider"
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect back to web app with session cookie
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly session cookie.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"

  /dev/auth/login:
    post:
      tags: [Dev]
      summary: Create local development session
      description: Available only outside production when AUTH_DEV_LOGIN_ENABLED=true.
      operationId: devLogin
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevLoginRequest"
      responses:
        "200":
          description: Authenticated dev user
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly session cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /profile/me:
    get:
      tags: [Profile]
      summary: Get private current user profile
      operationId: getMyProfile
      security:
        - cookieSession: []
      responses:
        "200":
          description: Private profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Profile]
      summary: Update private current user profile
      operationId: updateMyProfile
      security:
        - cookieSession: []
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyProfileRequest"
      responses:
        "200":
          description: Updated private profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /profiles/{username}:
    get:
      tags: [Profile]
      summary: Get public profile by username
      operationId: getPublicProfile
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 40
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfile"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /search/people:
    get:
      tags: [Profile]
      summary: Search public profiles by username or display name
      operationId: searchPeople
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Matching public profiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileSearch"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /articles/drafts:
    post:
      tags: [Articles]
      summary: Create article draft
      operationId: createArticleDraft
      security:
        - cookieSession: []
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDraftRequest"
      responses:
        "201":
          description: Created draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDraft"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /articles/my:
    get:
      tags: [Articles]
      summary: List current user articles
      operationId: listMyArticles
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: after_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current user articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDraftList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /articles/drafts/{articleId}:
    get:
      tags: [Articles]
      summary: Get own article draft
      operationId: getArticleDraft
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      responses:
        "200":
          description: Article draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDraft"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Articles]
      summary: Update own article draft and create new revision
      operationId: updateArticleDraft
      security:
        - cookieSession: []
        - csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDraftRequest"
      responses:
        "200":
          description: Updated draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDraft"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /articles/drafts/{articleId}/submit:
    post:
      tags: [Articles]
      summary: Submit draft for moderation or direct publication
      operationId: submitArticleDraft
      security:
        - cookieSession: []
        - csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitDraftRequest"
      responses:
        "200":
          description: Submitted draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDraft"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /articles/{articleId}:
    get:
      tags: [Articles]
      summary: Get published article
      operationId: getPublishedArticle
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      responses:
        "200":
          description: Published article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicArticle"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /feed:
    get:
      tags: [Articles]
      summary: List published feed articles
      operationId: listFeed
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Feed articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleList"
        "500":
          $ref: "#/components/responses/InternalError"

  /feed/popular:
    get:
      tags: [Articles]
      summary: List popular articles from the last 14 days
      operationId: listPopularFeed
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Popular feed articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleList"
        "500":
          $ref: "#/components/responses/InternalError"

  /articles/feed:
    get:
      tags: [Articles]
      summary: List personalized feed articles for current user
      operationId: listMyFeed
      security:
        - cookieSession: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Personalized feed articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /search:
    get:
      tags: [Articles]
      summary: Search published articles with PostgreSQL fallback search
      operationId: searchArticles
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 3
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleList"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /articles/{articleId}/comments:
    get:
      tags: [Comments]
      summary: List article comments
      operationId: listArticleComments
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      responses:
        "200":
          description: Article comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentList"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Comments]
      summary: Create article comment
      operationId: createArticleComment
      security:
        - cookieSession: []
        - csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /comments/{commentId}:
    get:
      tags: [Comments]
      summary: Get comment by id
      operationId: getComment
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Comments]
      summary: Edit own comment during edit window
      operationId: updateComment
      security:
        - cookieSession: []
        - csrfHeader: []
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentRequest"
      responses:
        "200":
          description: Updated comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /reactions:
    post:
      tags: [Reactions]
      summary: Set or remove reaction
      operationId: setReaction
      security:
        - cookieSession: []
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetReactionRequest"
      responses:
        "200":
          description: Reaction state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reaction"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /bookmarks/lists:
    get:
      tags: [Bookmarks]
      summary: List bookmark lists
      operationId: listBookmarkLists
      security:
        - cookieSession: []
      responses:
        "200":
          description: Bookmark lists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkLists"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Bookmarks]
      summary: Create bookmark list
      operationId: createBookmarkList
      security:
        - cookieSession: []
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookmarkListRequest"
      responses:
        "201":
          description: Created bookmark list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /bookmarks/items:
    get:
      tags: [Bookmarks]
      summary: List bookmarked published articles
      operationId: listBookmarkedArticles
      security:
        - cookieSession: []
      parameters:
        - name: list_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Bookmarked articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkedArticles"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Bookmarks]
      summary: Add article to bookmark list
      operationId: addBookmark
      security:
        - cookieSession: []
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddBookmarkRequest"
      responses:
        "204":
          description: Bookmark added
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    delete:
      tags: [Bookmarks]
      summary: Remove article from bookmark list
      operationId: removeBookmark
      security:
        - cookieSession: []
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveBookmarkRequest"
      responses:
        "204":
          description: Bookmark removed
        "401":
          $ref: "#/components/responses/Unauthorized"

  /subscriptions/{authorID}:
    post:
      tags: [Bookmarks]
      summary: Follow author
      operationId: followAuthor
      security:
        - cookieSession: []
        - csrfHeader: []
      parameters:
        - name: authorID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Follow state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowState"
    delete:
      tags: [Bookmarks]
      summary: Unfollow author
      operationId: unfollowAuthor
      security:
        - cookieSession: []
        - csrfHeader: []
      parameters:
        - name: authorID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Follow state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowState"

  /reports:
    get:
      tags: [Reports]
      summary: List pending reports for moderators
      operationId: listReports
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Pending reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Reports]
      summary: Create article or comment report
      operationId: createReport
      security:
        - cookieSession: []
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "201":
          description: Created report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /reports/{reportID}/decisions:
    post:
      tags: [Reports]
      summary: Add moderation decision to report
      operationId: decideReport
      security:
        - cookieSession: []
        - csrfHeader: []
      parameters:
        - name: reportID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecideReportRequest"
      responses:
        "200":
          description: Report state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /moderation/submissions:
    get:
      tags: [Moderation]
      summary: List pending article moderation submissions
      operationId: listModerationSubmissions
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Pending submissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerationSubmissionList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /moderation/submissions/{submissionID}/approve:
    post:
      tags: [Moderation]
      summary: Approve article moderation submission
      operationId: approveModerationSubmission
      security:
        - cookieSession: []
        - csrfHeader: []
      parameters:
        - name: submissionID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Submission state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerationSubmission"
        "401":
