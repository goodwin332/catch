name: catch

services:
  postgres:
    image: postgres:18-alpine
    container_name: catch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: catch
      POSTGRES_USER: catch
      POSTGRES_PASSWORD: catch
    ports:
      - "5432:5432"
    volumes:
      - catch-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catch -d catch"]
      interval: 5s
      timeout: 3s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: catch-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: local-meili-master-key
    ports:
      - "7700:7700"
    volumes:
      - catch-meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: quay.io/minio/minio:latest
    container_name: catch-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: catch
      MINIO_ROOT_PASSWORD: catch-local-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - catch-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  catch-postgres-data:
  catch-meilisearch-data:
  catch-minio-data:
